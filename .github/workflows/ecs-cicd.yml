name: Build Push Create ECS Deploy

on:
  push:
    branches:
      - main

jobs:

###############################################################################
# JOB 1 - BUILD & PUSH DOCKER IMAGES
###############################################################################

  docker:
    name: Build-and-Push-All-Images
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    strategy:
      matrix:
        include:
          - name: cake-backend-apache
            folder: cake-backend-apache
            repository: public.ecr.aws/w7d0i3d5/cake/backend

          - name: cake-frontend-tomcat
            folder: cake-frontend-tomcat
            repository: public.ecr.aws/w7d0i3d5/cake/frontend

          - name: cake-pda-nginx-1
            folder: cake-pda-nginx-1
            repository: public.ecr.aws/w7d0i3d5/cake/pda

          - name: cake-scia-agent-nginx-2
            folder: cake-scia-agent-nginx-2
            repository: public.ecr.aws/w7d0i3d5/cake/scia-agent

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Public ECR
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Logging into AWS Public ECR..."
          aws ecr-public get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin public.ecr.aws
          echo -e "\033[1;32m[SUCCESS]\033[0m Login successful"

      - name: Build Image
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Building image: ${{ matrix.name }}"
          docker build -t ${{ matrix.name }} ./${{ matrix.folder }}
          echo -e "\033[1;32m[SUCCESS]\033[0m Build completed"

      - name: Tag Image
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Tagging image..."
          docker tag ${{ matrix.name }}:latest ${{ matrix.repository }}:latest
          docker tag ${{ matrix.name }}:latest ${{ matrix.repository }}:${{ github.run_number }}

      - name: Push Image
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Pushing image to ECR..."
          docker push ${{ matrix.repository }}:latest
          docker push ${{ matrix.repository }}:${{ github.run_number }}
          echo -e "\033[1;32m[SUCCESS]\033[0m Image pushed successfully"

      - name: Job Summary
        run: |
          echo "## Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ matrix.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY

###############################################################################
# JOB 2 - ECS DEPLOYMENT
###############################################################################

  deploy:
    name: Create-SG-Task-Service-Deploy
    runs-on: ubuntu-latest
    needs: docker

    env:
      AWS_REGION: us-east-1
      ECS_CLUSTER: my-ecs-cluster
      VPC_ID: vpc-073aa5721affff3f6
      SUBNET_1: subnet-0c31aad618d7831aa
      SUBNET_2: subnet-0b7b9781a76282097

    strategy:
      matrix:
        include:

          - family: cake-backend-task
            container: cake-backend
            image: public.ecr.aws/w7d0i3d5/cake/backend:latest
            service: cake-backend-task-service
            port: 80
            cpu: 512
            memory: 1024
            sg_name: my-sg-cake-backend

          - family: cake-frontend-task
            container: cake-frontend
            image: public.ecr.aws/w7d0i3d5/cake/frontend:latest
            service: cake-frontend-task-service
            port: 8080
            cpu: 1024
            memory: 2048
            sg_name: my-sg-cake-frontend

          - family: cake-pda-task
            container: cake-pda
            image: public.ecr.aws/w7d0i3d5/cake/pda:latest
            service: cake-pda-task-service
            port: 80
            cpu: 256
            memory: 512
            sg_name: my-sg-cake-pda

          - family: cake-scia-agent-task
            container: cake-scia-agent
            image: public.ecr.aws/w7d0i3d5/cake/scia-agent:latest
            service: cake-scia-agent-task-service
            port: 80
            cpu: 512
            memory: 1024
            sg_name: my-sg-cake-scia

    steps:

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

###############################################################################
# SECURITY GROUP
###############################################################################

      - name: Check Security Group
        id: sgcheck
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Checking Security Group..."
          SG_ID=$(aws ec2 describe-security-groups \
          --filters Name=group-name,Values=${{ matrix.sg_name }} Name=vpc-id,Values=$VPC_ID \
          --query 'SecurityGroups[0].GroupId' \
          --output text)

          if [ "$SG_ID" = "None" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo -e "\033[1;33m[WARNING]\033[0m Security Group not found"
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT
            echo -e "\033[1;32m[SUCCESS]\033[0m Security Group already exists: $SG_ID"
          fi

      - name: Create Security Group
        if: steps.sgcheck.outputs.exists == 'false'
        id: createsg
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Creating Security Group..."
          NEW_SG=$(aws ec2 create-security-group \
          --group-name ${{ matrix.sg_name }} \
          --description "${{ matrix.sg_name }}" \
          --vpc-id $VPC_ID \
          --query 'GroupId' \
          --output text)

          aws ec2 authorize-security-group-ingress \
          --group-id $NEW_SG \
          --protocol tcp \
          --port ${{ matrix.port }} \
          --cidr 0.0.0.0/0

          echo "sg_id=$NEW_SG" >> $GITHUB_OUTPUT
          echo -e "\033[1;32m[SUCCESS]\033[0m Security Group created: $NEW_SG"

###############################################################################
# TASK DEFINITION
###############################################################################

      - name: Register Task Definition
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Registering Task Definition..."
          aws ecs register-task-definition \
          --family ${{ matrix.family }} \
          --network-mode awsvpc \
          --requires-compatibilities FARGATE \
          --cpu ${{ matrix.cpu }} \
          --memory ${{ matrix.memory }} \
          --runtime-platform operatingSystemFamily=LINUX,cpuArchitecture=X86_64 \
          --container-definitions "[{
            \"name\":\"${{ matrix.container }}\",
            \"image\":\"${{ matrix.image }}\",
            \"essential\":true,
            \"portMappings\":[{
              \"containerPort\":${{ matrix.port }},
              \"hostPort\":${{ matrix.port }},
              \"protocol\":\"tcp\"
            }]
          }]"
          echo -e "\033[1;32m[SUCCESS]\033[0m Task Definition Registered"

###############################################################################
# SERVICE CHECK
###############################################################################

      - name: Check ECS Service
        id: svc
        run: |
          STATUS=$(aws ecs describe-services \
          --cluster $ECS_CLUSTER \
          --services ${{ matrix.service }} \
          --query 'services[0].status' \
          --output text 2>/dev/null)

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo -e "\033[1;32m[SUCCESS]\033[0m ECS Service exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo -e "\033[1;33m[WARNING]\033[0m ECS Service not found"
          fi

###############################################################################
# CREATE ECS SERVICE
###############################################################################

      - name: Create ECS Service
        if: steps.svc.outputs.exists == 'false'
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Creating ECS Service..."
          aws ecs create-service \
          --cluster $ECS_CLUSTER \
          --service-name ${{ matrix.service }} \
          --task-definition ${{ matrix.family }} \
          --desired-count 1 \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_1,$SUBNET_2],assignPublicIp=ENABLED}"
          echo -e "\033[1;32m[SUCCESS]\033[0m ECS Service Created"

###############################################################################
# UPDATE ECS SERVICE
###############################################################################

      - name: Update ECS Service
        if: steps.svc.outputs.exists == 'true'
        run: |
          echo -e "\033[1;34m[INFO]\033[0m Updating ECS Service..."
          aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service ${{ matrix.service }} \
          --task-definition ${{ matrix.family }} \
          --force-new-deployment
          echo -e "\033[1;32m[SUCCESS]\033[0m ECS Service Updated"

###############################################################################
# FINAL SUMMARY
###############################################################################

      - name: Deployment Summary
        run: |
          echo "## ECS Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Service: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- Task Definition: ${{ matrix.family }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY

name: Build and Push Docker Image to AWS Public ECR

on:
  push:
    branches:
      - main

jobs:
  docker:
    name: Build-Push-Docker-Image-to-AWS-Public-ECR
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      IMAGE_NAME: nginx-test
      ECR_REPOSITORY: public.ecr.aws/w7d0i3d5/my-public-acr/nginx-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to AWS Public ECR
        run: |
          aws ecr-public get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Tag Image
        run: |
          docker tag $IMAGE_NAME:latest $ECR_REPOSITORY:latest
          docker tag $IMAGE_NAME:latest $ECR_REPOSITORY:${{ github.run_number }}

      - name: Push Image
        run: |
          docker push $ECR_REPOSITORY:latest
          docker push $ECR_REPOSITORY:${{ github.run_number }}

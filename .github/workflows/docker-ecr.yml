name: Build and Push Docker Image to AWS Public ECR

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to AWS Public ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Build Docker Image
        run: |
          docker build -t nginx-test .

      - name: Tag Docker Image
        run: |
          docker tag nginx-test:latest public.ecr.aws/w7d0i3d5/my-public-acr/nginx-test:latest

      - name: Push Docker Image
        run: |
          docker push public.ecr.aws/w7d0i3d5/my-public-acr/nginx-test:latest
